{% extends base.html %}

{% block title %}
страница входа
{% endblock %}

{% block content %}
<form method="post">
    {% csrf token %}
    <label for="username">логин</label>
    <input type="text" name="username" id="username">
    <button type="submit">войти</button>
</form>

{% if form.errors %}
<p>неверный логин или пароль</p>
{% endif %}
<div>
    <a>войти без авторизаций</a>
</div>

{% endblock %}
